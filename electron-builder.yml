# electron-builder 설정 (Tauri 빌드 파이프라인 대체).
#
# 핵심 의도:
# - 사용자가 메뉴바/dock 에 보는 이름은 그대로 "토큰 지키미" 유지하되, 파일시스템
#   bundle 이름은 ASCII (TokenGuardian.app) — Electron 의 helper.app 경로 lookup
#   이 NFC/NFD unicode encoding mismatch 로 SIGTRAP 나는 회귀를 회피.
# - 산출물 이름은 처음부터 `token-panda_${version}_*` 패턴으로 박는다. v1.74.8
#   에서 productName 한글 prefix 가 GitHub asset 업로드 시 잘려 `_1.74.8_*`
#   으로 올라간 회귀를 *빌드 시점*에 차단 (rename post-job 폐기).
# - 아이콘은 build/icon.png(1024) 한 장만 두면 electron-builder 가 .icns/.ico
#   를 알아서 생성. 기존 src-tauri/icons/ 의 다양한 PNG 는 더 이상 필요 없음.

appId: com.tnew.clauddeskpet
# 사용자가 보는 앱 이름은 한글 "토큰 지키미". 단 productName/helper 는 ASCII 유지
# (한글이면 helper 경로 NFC/NFD mismatch 로 SIGTRAP). 한글 표시명은 *빌드 후 폴더
# rename* 이 아니라 아래 dmg.contents[].name 으로 dmg 안에서만 바꾼다.
#   ⚠️ v2.24.0(mac): afterPack 훅으로 TokenGuardian.app→한글 rename 했더니
#   electron-builder 가 이후 서명·검증·dmg 단계에서 TokenGuardian.app 경로를 못
#   찾아 "Application entry file ... does not exist" 로 빌드가 깨졌다. rename 을
#   파이프라인에서 빼고 dmg 표시명만 바꾸는 방식으로 교체(공증 staple 은 .app
#   내부에 있어 폴더명만 바뀌어도 무사).
# productName 은 *파일시스템 식별자 + Electron 내부 helper 경로 lookup* 에
# 쓰인다. Korean (NFC/NFD encoding mismatch) 이 들어가면 Electron 의
# `electron_main_delegate_mac.mm` 가 Helper.app path 해석에서 SIGTRAP.
# → ASCII 로 두고, 사용자가 메뉴바/Finder 에서 보는 이름은 아래 mac.extendInfo
# 의 CFBundleDisplayName 으로 "토큰 지키미" 로 띄운다.
productName: "TokenGuardian"
copyright: "Copyright © 2026 JohnPrk"

directories:
  buildResources: build
  output: release

# Electron 33 + electron-builder 26 조합에서 asar 패키징 직후 Info.plist 에
# 박는 ElectronAsarIntegrity hash 가 *실제 app.asar SHA256* 과 어긋나는 회귀가
# 있어 V8 가 SIGTRAP 으로 abort 한다. 임시 회피로 asar 통째 비활성화. 후속
# [소] 로 electron-builder 버그 fix 가 올라오면 asar=true 복원 고려.
asar: false

# asar 안에 들어갈 런타임 파일들. node_modules 는 electron-builder 가
# productionDeps 만 자동으로 추린다.
files:
  - dist/**
  - electron/**
  - package.json
  - "!**/*.test.mjs"
  - "!**/*.test.ts"
  - "!src-tauri/**"

# 런타임에 process.resourcesPath 하위로 풀려야 하는 정적 자산. main.cjs 가
# path.join(process.resourcesPath, "build", "tray.png") 로 읽는다.
extraResources:
  - from: build/tray.png
    to: build/tray.png
  - from: build/tray
    to: build/tray
  - from: build/icon.ico
    to: build/icon.ico

mac:
  category: public.app-category.developer-tools
  # CFBundleName 은 productName(=TokenGuardian) 그대로 — Electron helper 가
  # CFBundleName 으로 helper.app path 를 lookup 해서 NFC/NFD mismatch SIGTRAP
  # 회피. 사용자가 dock/menubar 에 보는 이름만 CFBundleDisplayName 으로
  # "토큰 지키미" 으로 override.
  extendInfo:
    CFBundleDisplayName: "토큰 지키미"
  target:
    - target: dmg
      arch:
        - arm64
  # Developer ID 직접 배포 = 하드닝 런타임 + 공증(notarize) 필수.
  # 서명 인증서는 키체인의 "Developer ID Application" 또는 CI 의 CSC_LINK 에서
  # 자동 발견. notarize:true 는 서명 후 Apple 공증 서버 제출 + .dmg stapling 까지
  # 자동 처리하고, Apple ID / 앱암호 / 팀ID 는 환경변수(APPLE_ID /
  # APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID)로 받는다. 서명 자격이 없으면
  # (로컬에서 CSC_IDENTITY_AUTO_DISCOVERY=false) 공증도 자동 skip 된다.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  artifactName: "token-panda_${version}_${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "token-panda_${version}_x64-setup.${ext}"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false

dmg:
  title: "토큰 지키미"
  artifactName: "token-panda_${version}_${arch}.${ext}"
  # dmg 안의 .app 파일명을 한글로 표시 → 사용자가 /Applications 로 끌어다 놓으면
  # "토큰 지키미.app" 로 설치된다. on-disk productName(TokenGuardian)·helper 는 ASCII
  # 그대로라 SIGTRAP 회피. (DmgContent.name = dmg 내 파일명, 기본값은 path 의 basename)
  contents:
    - x: 130
      y: 220
      type: file
      name: "토큰 지키미.app"
    - x: 410
      y: 220
      type: link
      path: /Applications
