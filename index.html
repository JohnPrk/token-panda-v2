<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>claude-desk-pet</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 펫 윈도우(라벨 "main")일 때 html/body/#root가 마우스 hit-test를
         받지 않도록 main.tsx 마운트 직전에 강제. CSS :has() 동적 평가 의존
         없이 가장 빠른 시점에 박는다. settings/onboarding/preview 윈도우는
         이 분기 밖이라 평소처럼 클릭 받음.
         v1.74.3: URL 의존(query/hash 둘 다) 을 Windows WebView2 가 떨궈서
         Tauri 의 내부 글로벌 (__TAURI_INTERNALS__.metadata.currentWindow.label)
         로 직접 라벨 조회. Tauri 부트스트랩이 DocumentStart 타이밍에
         주입되므로 이 인라인 스크립트 시점엔 이미 채워져 있음. dev 브라우저
         (Tauri 미주입) 폴백으로 URL 검사 유지. -->
    <script>
      (function () {
        var label = null;
        try {
          var m = window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.metadata;
          label = (m && m.currentWindow && m.currentWindow.label) || null;
        } catch (e) {}
        var isPet;
        if (label !== null) {
          isPet = label === "main";
        } else {
          var raw = location.hash.charAt(0) === "#" ? location.hash.slice(1) : location.hash;
          var hashView = new URLSearchParams(raw).get("view");
          var queryView = new URLSearchParams(location.search).get("view");
          isPet = !hashView && !queryView;
        }
        if (isPet) {
          document.documentElement.style.pointerEvents = "none";
          document.body.style.pointerEvents = "none";
          var r = document.getElementById("root");
          if (r) r.style.pointerEvents = "none";
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
