name: Release

# 두 가지 trigger:
#  1. `v*.*.*` 태그 push → 정식 GitHub Release 생성 + 양 OS 산출물 자동 업로드
#  2. workflow_dispatch (수동) → Release 없이 빌드만, artifact로만 검증용
#
# 2026-05-21: Tauri 빌드 파이프라인 → Electron (electron-builder) 로 이전.
# 회귀 #11 (NSPanel canBecomeKeyWindow=NO) 일소가 1차 목표. usage stack 등
# 큰 회귀 (PROGRESS.md §5) 는 별도 [대] 로 후속 포팅.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# softprops/action-gh-release 가 Releases API 로 release 생성·자산 업로드를
# 하려면 contents:write 필요.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — electron-builder 가 .dmg 산출
          - platform: macos-latest
            label: macos-aarch64
            dist_script: dist:mac
            asset_glob: 'release/*.dmg'
          # Windows x64 — electron-builder 가 NSIS .exe installer 산출
          - platform: windows-latest
            label: windows-x64
            dist_script: dist:win
            asset_glob: 'release/*.exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Electron bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.dist_script }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: 'Auto-generated by GitHub Actions. See version.md for changelog.'
          draft: false
          prerelease: false
          files: ${{ matrix.asset_glob }}

      - name: Upload build artifacts (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: token-panda-${{ matrix.label }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: warn
