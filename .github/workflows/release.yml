name: Release

# 두 가지 trigger:
#  1. `v*.*.*` 태그 push → 정식 GitHub Release 생성 + 양 OS 산출물 자동 업로드
#  2. workflow_dispatch (수동) → Release 없이 빌드만, artifact로만 검증용
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# tauri-action 이 Releases API 로 draft release 생성 + 산출물 업로드를 하려면
# contents:write 필요. 기본 GITHUB_TOKEN 은 read-only 인 저장소가 많아 v1.47/v1.49
# 빌드가 "Resource not accessible by integration" 으로 실패한 원인.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (현재 정식 배포 형식, dmg)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-aarch64
          # Windows x64 (NSIS .exe installer)
          - platform: windows-latest
            args: ''
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run cargo tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tag push가 trigger면 자동으로 Release 생성·업로드. workflow_dispatch면
          # tagName 비워두고 artifact 업로드만.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseBody: 'Auto-generated by GitHub Actions. See version.md for changelog.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename dmg (macOS only)
        if: matrix.platform == 'macos-latest'
        run: node scripts/rename-dmg.mjs

      - name: Upload build artifacts (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: token-panda-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
          if-no-files-found: warn
